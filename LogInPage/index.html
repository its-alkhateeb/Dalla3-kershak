<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Sofra — Sign In</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="../HomePage/Home.html" class="navbar-brand">El Sofra</a>
    <ul class="navbar-links">
      <li><a href="../HomePage/Home.html">Home</a></li>
      <li><a href="../RecipesList/ListOfRecipes.html">Recipes</a></li>
      <li><a href="../Favourites/Favourites.html">Favourites</a></li>
      <li><a href="../ProfilePage/Profile.html">Profile</a></li>
    </ul>
    <div class="navbar-auth">
      <a href="../LogInPage/index.html" class="active-link">Log In</a>
      <a href="../SignUpPage/Sign up.html" class="signup-btn">Sign Up</a>
    </div>
  </nav>

  <main class="auth-page">

    <div class="auth-wrap">

      <!-- Left decorative panel -->
      <div class="auth-panel">
        <div class="panel-ornament">&#10022;</div>
        <h1 class="panel-brand">El Sofra</h1>
        <p class="panel-sub">Egyptian Kitchen</p>
        <div class="panel-line"></div>
        <p class="panel-msg">Welcome back.<br>Sign in to explore<br>authentic Egyptian recipes.</p>
        <a href="../SignUpPage/Sign up.html" class="panel-btn">Create an account</a>
      </div>

      <!-- Right form panel -->
      <div class="auth-form-side">

        <div class="toast" id="toast"></div>

        <h2 class="form-title">Welcome back</h2>
        <p class="form-sub">Good to see you again</p>

        <!-- Role selector -->
        <div class="role-row">
          <div class="role-pill active" id="roleUser" onclick="pickRole('user')">User</div>
          <div class="role-pill" id="roleAdmin" onclick="pickRole('admin')">Admin</div>
        </div>

        <form onsubmit="handleLogin(event)">

          <div class="fg">
            <label for="loginEmail">Email or username</label>
            <input type="text" id="loginEmail" name="email" placeholder="your@email.com" required>
          </div>

          <div class="fg">
            <label for="loginPass">Password</label>
            <div class="input-wrap">
              <input type="password" id="loginPass" name="password" placeholder="Your password" required>
              <button type="button" class="eye-btn" onclick="togglePass('loginPass', this)" aria-label="Toggle password visibility">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-helper">
            <label class="check-label">
              <input type="checkbox" name="remember"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn">Sign In</button>

        </form>

        <p class="switch-text">Don't have an account? <a href="../SignUpPage/Sign up.html">Sign up</a></p>

      </div>
    </div>

  </main>

  <script src="script.js"></script>


</body>
</html>
