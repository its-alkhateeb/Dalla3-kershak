<html>
<head>
    <link rel="stylesheet" href="addpage.css">
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&...&display=swap" rel="stylesheet"/>
    <title>Add new recipe</title>
</head> 


<body style="background-color: #fdf6ee;">
 <nav class="navbar">
  <a href="../HomePage/Home.html" class="navbar-brand">El Sofra</a>
  <div class="navbar-search">
    <img src="../Favourites/icons/magnifying-glass.svg" alt="search" width="15" height="15">
    <input type="text" placeholder="Search recipes...">
</div>
  <div class="navbar-auth">
    <a href="../ProfilePage/Profile.html" class="navbar-profile-icon">
    <img src="../Favourites/icons/user.svg" width="38" height="38">
    </a>
  </div>
    </nav>

<!-- inputs   -->
    <div class="content">    
        <h1>Add New Egyptian Masterpiece</h1>

        <form action="submit.html" method="get" class="form-card">
            
            <div class="image">
            <h2>Add Recipe Photo</h2>
            <label for="inputimg">
                <img  id="Recipeimg" src="white.jpg" alt="add image">
            </label>
            <label class="imageLabel" for="inputimg">Update Image</label>
            <input type="file" accept="image/*" id="inputimg">
            </div>
           <div class="idnamesec">
             <div class="idname">
            <h2>Recipe ID</h2>
            <input type="text" required id="recipeID" >
            </div>
            <div class="idname">
                <h2>Recipe Name</h2>
                <input type="text" id="recipeName" required > 
            </div>
           </div>
            <!-- course name choices -->
            
            <div class="form-section">
                <h2>Choose Course Name</h2>
                 <div class="form-sectionRadio">
                    <div>
                        <input class="radio-input" type="radio" id="apetizer" name="course" value="Appetizers" required>
                        <label class="radio-label" for="apetizer">Appetizers</label> 
                    </div>
                    <div>
                        <input class="radio-input" type="radio" id="main" name="course" value="Main Course" required>
                        <label class="radio-label" for="main">Main Course</label>
                    </div>
                    <div>
                        <input class="radio-input" type="radio" id="dessert" name="course" value="Dessert" required>
                        <label class="radio-label" for="dessert">Dessert</label>
                    </div>
                    </div>
                </div>
         
            <div id="ingredients">
            <div class="ingredientSec">

            <h2> Ingredients</h2>

            <div class="fixedingredient">
                <!-- <h3>ingredient 1</h3 > -->
                <input type="text" placeholder="Name" required>
                <input type="text" placeholder="ID" required>
                <input type="text" placeholder="quantity"  required>
            </div>

            <div class="ingredient">
                <!-- <h3>ingredient 1</h3 > -->
                <input type="text" placeholder="Name" >
                <input type="text" placeholder="ID" >
                <input type="text" placeholder="quantity" >
            </div>

                <button type="button" id="add-btn">Add Ingredient</button>
                <input class="submitbtn" type="submit" value="Save Recipe">
            

   
           </div>
           </div>
        </form>
        
    </div>

      <footer >
           <hr>
           <p><small>&copy; 2026 Recipe Finder Project | Structured in Pure HTML</small></p>
     </footer>

</body>

<script src="addpage.js"></script>

</html>
