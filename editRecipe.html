        <h1>Edit Recipe</h1>
        <!-- inputs   -->
    <div>    
        <form action="submit.html" method="get">
            <div>
            <h2>Recipe ID</h2>
            <label for="recipeID">Recipe ID</label>
            <input type="number" required id="recipeID" value="1111">
            </div>
            <div>
                <h2>Recipe Name</h2>
                <label for="recipeName">Recipe Name</label>
                <input type="text" id="recipeName" required value="koshari"> 
            </div>
            <!-- course name choices -->
            <div>
                 <h2>Choose Course Name</h2>
                 <div>
                    <input type="radio" id="apetizer" name="course" value="Appetizers" required>
                    <label for="apetizer">Appetizers</label> 
                </div>
                <div>
                    <input type="radio" id="main" name="course" value="Main Course" required checked>
                    <label for="main">Main Course</label>
                </div>
                <div>
                    <input type="radio" id="dessert" name="course" value="Dessert" required>
                    <label for="dessert">Dessert</label>
                </div>
            </div>
            <!-- adding ingredients with static number till we add js so it becomes unlimited -->
             <!-- to be edited -->
            <div>
            <h2>Add Ingredients</h2>

            <div>
                <h3>ingredient 1</h3 >
                <input type="text" placeholder="Name" required value=" white rice">
                <input type="text" placeholder="ID" required value="1211">
                <input type="text" placeholder="quantity" required value="1 cup">
            </div>
            <div>
                <h3>ingredient 2</h3>
                <input type="text" placeholder="Name" value="elbow macaroni">
                <input type="text" placeholder="ID" value="1311">
                <input type="text" placeholder="quantity" required value="1 cup">
            </div>
            <div>
                <h3>ingredient 3</h3>
                <input type="text" placeholder="Name" value="brown lentills">
                <input type="text" placeholder="ID" value="1411">
                <input type="text" placeholder="quantity" required value="1 cup">
            </div>
            <div>
                <h3>ingredient 4</h3>
                <input type="text" placeholder="Name" value="tomato sauce">
                <input type="text" placeholder="ID" value="1511">
                <input type="text" placeholder="quantity" required value="2 cups">
            </div>
            <div>
                <h3>ingredient 5</h3>
                <input type="text" placeholder="Name" value="sliced onions">
                <input type="text" placeholder="ID" value="1611">
                <input type="text" placeholder="quantity" required value="2 cups">
            </div>
           </div>
            <input type="submit">
        </form>
        </div>

    </body>
